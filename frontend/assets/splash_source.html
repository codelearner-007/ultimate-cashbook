<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1284" />
<title>Ultimate CashBook Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1284px;
    height: 2778px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }

  .bg {
    width: 1284px;
    height: 2778px;
    background: #EEF7F7;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Teal blobs — matching LoginScreen BackgroundBlobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  /* Top-right large blob */
  .blob-1 {
    width: 560px; height: 520px;
    top: -130px; right: -200px;
    background: rgba(57,170,170,0.14);
  }
  /* Left-middle smaller blob */
  .blob-2 {
    width: 400px; height: 380px;
    top: 900px; left: -200px;
    background: rgba(57,170,170,0.10);
  }
  /* Bottom-left large solid teal circle */
  .blob-3 {
    width: 640px; height: 600px;
    bottom: -120px; left: -120px;
    background: rgba(57,170,170,0.55);
  }
  /* Bottom-right medium circle */
  .blob-4 {
    width: 480px; height: 460px;
    bottom: -80px; right: -80px;
    background: rgba(57,170,170,0.35);
  }

  /* Center content */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Circular logo with teal ring */
  .logo-border {
    width: 488px;
    height: 488px;
    border-radius: 50%;
    border: 12px solid rgba(57,170,170,0.30);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 80px;
  }
  .logo-circle {
    width: 440px;
    height: 440px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 16px 64px rgba(0,0,0,0.20), 0 4px 20px rgba(0,0,0,0.10);
  }
  .logo-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* App name */
  .app-name {
    font-size: 96px;
    font-weight: 800;
    color: #39AAAA;
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.1;
  }

  /* Tagline */
  .tagline {
    font-size: 42px;
    font-weight: 400;
    color: #64748B;
    text-align: center;
    letter-spacing: 0.4px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

    <div class="content">
      <div class="logo-border">
        <div class="logo-circle">
          <img src="./logo1.jpg" alt="Ultimate CashBook Logo" />
        </div>
      </div>

      <div class="app-name">Ultimate CashBook</div>
      <div class="tagline">Smart money tracking for your business</div>
    </div>
  </div>
</body>
</html>
