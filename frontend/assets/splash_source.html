<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1284" />
<title>Ultimate CashBook Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1284px;
    height: 2778px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  }

  .bg {
    width: 1284px;
    height: 2778px;
    background:
      radial-gradient(ellipse 140% 70% at 50% 0%,   #1ecfb0 0%, transparent 55%),
      radial-gradient(ellipse 120% 60% at 100% 100%, #0a6e72 0%, transparent 55%),
      linear-gradient(175deg, #0e8a8a 0%, #0d6f6f 40%, #09595a 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Soft background shapes */
  .shape {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .shape-1 {
    width: 1100px; height: 1100px;
    top: -380px; right: -380px;
    background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 65%);
  }
  .shape-2 {
    width: 900px; height: 900px;
    bottom: -320px; left: -320px;
    background: radial-gradient(circle, rgba(30,207,176,0.18) 0%, transparent 65%);
  }
  .shape-3 {
    width: 600px; height: 600px;
    top: 16%; left: -180px;
    background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 65%);
  }
  .shape-4 {
    width: 480px; height: 480px;
    bottom: 16%; right: -140px;
    background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 65%);
  }

  /* Subtle dot grid */
  .mesh {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
    background-size: 52px 52px;
  }

  /* Center card */
  .card {
    position: relative;
    z-index: 10;
    width: 1040px;
    padding: 108px 96px 100px;
    background: rgba(255,255,255,0.14);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 56px;
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    box-shadow:
      0 40px 100px rgba(0,0,0,0.25),
      0 12px 40px rgba(0,0,0,0.12),
      inset 0 1.5px 0 rgba(255,255,255,0.32),
      inset 0 -1px 0 rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Logo */
  .logo-wrap {
    width: 360px;
    height: 360px;
    border-radius: 72px;
    overflow: hidden;
    background: #fff;
    box-shadow:
      0 24px 64px rgba(0,0,0,0.24),
      0 6px 20px rgba(0,0,0,0.12),
      0 0 0 12px rgba(255,255,255,0.20);
    flex-shrink: 0;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Divider pill */
  .pill {
    margin-top: 56px;
    width: 48px;
    height: 5px;
    border-radius: 10px;
    background: rgba(255,255,255,0.50);
  }

  /* App name */
  .app-name {
    margin-top: 36px;
    font-size: 84px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -1.5px;
    text-align: center;
    line-height: 1.05;
    white-space: nowrap;
    text-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  /* Tagline */
  .tagline {
    margin-top: 20px;
    font-size: 34px;
    font-weight: 400;
    color: rgba(255,255,255,0.70);
    text-align: center;
    letter-spacing: 0.2px;
    line-height: 1.5;
    white-space: nowrap;
  }

  /* Feature badges */
  .badges {
    margin-top: 56px;
    display: flex;
    align-items: center;
    gap: 22px;
  }
  .badge {
    padding: 16px 40px;
    background: rgba(255,255,255,0.16);
    border: 1.5px solid rgba(255,255,255,0.32);
    border-radius: 100px;
    font-size: 28px;
    font-weight: 600;
    color: rgba(255,255,255,0.92);
    letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
  }

  /* Bottom branding */
  .bottom {
    position: absolute;
    bottom: 90px;
    left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .bottom-dev {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }
  .bottom-link {
    font-size: 24px;
    font-weight: 400;
    color: rgba(255,255,255,0.30);
    letter-spacing: 0.5px;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(255,255,255,0.20);
  }
</style>
</head>
<body>
  <div class="bg">
    <div class="mesh"></div>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>

    <div class="card">
      <div class="logo-wrap">
        <img src="./logo1.jpg" alt="Ultimate CashBook Logo" />
      </div>

      <div class="pill"></div>

      <div class="app-name">Ultimate CashBook</div>
      <div class="tagline">Smart money tracking for your business</div>

      <div class="badges">
        <div class="badge">Income</div>
        <div class="badge">Expense</div>
        <div class="badge">Reports</div>
      </div>
    </div>

    <div class="bottom">
      <div class="bottom-dev">Developed by Devautobot</div>
      <div class="bottom-link">devautobot.com</div>
    </div>
  </div>
</body>
</html>
